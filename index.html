<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osu! Map Mixer</title>
    <link rel="stylesheet" href="/src/ui/css/background.css">
    <link rel="stylesheet" href="/src/ui/css/top-bar.css">
    <link rel="stylesheet" href="/src/ui/css/canvas.css">
    <link rel="stylesheet" href="/src/ui/css/tracks-container.css">
    <link rel="stylesheet" href="/src/ui/css/utility-bar.css">
    <link rel="stylesheet" href="/src/ui/css/timeline-bar.css">
    <link rel="stylesheet" href="/src/ui/css/master-track.css">
    <link rel="stylesheet" href="/src/ui/css/normal-track.css">
    <link rel="stylesheet" href="/src/ui/css/bottom-bar.css">
    <link rel="stylesheet" href="/src/ui/css/pop-up.css">
    <!-- JSZip Library for client-side, in-memory decompression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <!-- Hidden File Input for OSZ selection -->
    <input type="file" id="oszFileInput" accept=".osz" style="display: none;">

    <!-- Global Full-Screen Loader Overlay -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-box">
            <div class="spinner"></div>
            <div class="loader-text" id="loaderText">Fetching Beatmap from osu! servers...</div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Welcome Modal -->
    <div class="welcome-modal" id="welcomeModal">
        <div class="modal-content">
            <h2>Welcome to Osu! Map Mixer</h2>
            <div class="drop-zone" id="dropZone">
                <p>Drag & Drop .osz or Map Folder Here</p>
                <span class="drop-subtext">or click to choose folder/file</span>
            </div>
            
            <!-- Paste URL Input Box -->
            <div class="url-input-container">
                <input type="text" id="modalUrlInput" placeholder="Paste osu! beatmap URL (e.g., https://osu.ppy.sh/b/...)">
                <button class="btn btn-secondary" id="loadUrlBtn">Load Link</button>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-success" id="importOszBtnModal">Import .osz Map</button>
                <button class="btn btn-secondary" id="importFolderBtnModal">Import Folder</button>
                <button class="btn btn-neutral" id="newCanvasBtn">New Canvas</button>
            </div>
        </div>
    </div>

    <!-- Top menu bar -->
    <div class="menu-bar">
        <div class="menu-brand">osu! Map Mixer</div>
        
        <!-- Volume Control Bar -->
        <div class="menu-volume-container" id="menuVolumeContainer">
            <span class="volume-icon" id="volumeMuteBtn">🔊</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span class="volume-percent" id="volumePercent">50%</span>
        </div>

        <div class="menu-group">
            <div class="menu-item dropdown" id="importDropdown">
                <span class="dropdown-trigger" id="importDropdownTrigger">Import ▼</span>
                <div class="dropdown-content">
                    <div class="dropdown-item" id="importOszBtnMenu">Import .osz</div>
                    <div class="dropdown-item" id="importFolderBtnMenu">Import Folder</div>
                    <hr class="dropdown-divider">
                    <div class="dropdown-input-wrapper">
                        <input type="text" id="menuUrlInput" placeholder="Paste beatmap URL here...">
                    </div>
                </div>
            </div>
            <div class="menu-item" id="exportBtnMenu">Export</div>
        </div>
    </div>

    <!-- Main canvas area -->
    <div class="canvas-container">
        <canvas id="beatmapCanvas"></canvas>
    </div>

    <!-- Divider -->
    <div class="divider" id="divider"></div>

    <!-- Tracks container -->
    <div class="tracks-container" id="tracks-container">
        <!-- Tracks will be rendered here -->
    </div>

    <!-- Bottom status bar -->
    <div class="bottom-status-bar" id="bottom-status-bar">
        <div class="info-bubble" id="playhead-bubble">Time: 00:00.000 / 03:00.000</div>
        <div class="info-bubble" id="zoom-bubble">Visible: 180.0s</div>
    </div>

    <!-- Fixed script tag with type="module" to enable ES modules processing -->
    <script type="module" src="/src/app.js"></script>
</body>
</html>
