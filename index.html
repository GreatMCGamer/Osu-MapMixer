<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osu! Map Mixer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Welcome Modal -->
    <div class="welcome-modal" id="welcomeModal">
        <div class="modal-content">
            <h2>Welcome to Osu! Map Mixer</h2>
            <div class="drop-zone" id="dropZone">
                <p>Drag & Drop Map Folder Here</p>
                <span class="drop-subtext">or click to choose folder</span>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="importFolderBtnModal">Import Map Folder</button>
                <button class="btn btn-success" id="newCanvasBtn">New Empty Canvas</button>
            </div>
        </div>
    </div>

    <!-- Top menu bar -->
    <div class="menu-bar">
        <div class="menu-brand">osu! Map Mixer</div>
        <div class="menu-group">
            <div class="menu-item" id="importFolderBtnMenu">Import Folder</div>
            <div class="menu-item" id="exportBtnMenu">Export</div>
        </div>
    </div>

    <!-- Main canvas area -->
    <div class="canvas-container">
        <canvas id="beatmapCanvas"></canvas>
    </div>

    <!-- Master track -->
    <div class="master-track" id="master-track">
        <!-- Master track content will go here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
